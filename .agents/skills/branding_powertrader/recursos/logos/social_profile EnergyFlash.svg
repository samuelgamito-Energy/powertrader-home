<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <style>
      .bg { fill: #0F172A; }
      .text-main { fill: #FFFFFF; font-family: 'Segoe UI', sans-serif; font-weight: 800; }
      .text-sub { fill: #22d3ee; font-family: 'Segoe UI', sans-serif; font-weight: 300; }
    </style>
  </defs>
  
  <rect width="400" height="400" class="bg"/>

  <!-- Icon: Flash Wave (Centered) -->
  <g transform="translate(100, 70) scale(2.5)">
    <path d="M0 30 C15 60 30 0 45 45 L55 25 L65 70 L80 10" fill="none" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="80" cy="10" r="4" fill="#FFFFFF"/>
  </g>

   <!-- Text Bottom -->
  <text x="200" y="320" font-size="36" text-anchor="middle" class="text-main">ENERGY<tspan class="text-sub">FLASH</tspan></text>
</svg>
