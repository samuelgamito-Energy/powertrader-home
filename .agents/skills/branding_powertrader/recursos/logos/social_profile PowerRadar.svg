<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <style>
      .bg { fill: #0F172A; }
      .text-main { fill: #FFFFFF; font-family: 'Segoe UI', sans-serif; font-weight: 800; }
      .text-sub { fill: #22d3ee; font-family: 'Segoe UI', sans-serif; font-weight: 300; }
    </style>
  </defs>
  
  <rect width="400" height="400" class="bg"/>

  <!-- Icon: Radar (Centered) -->
  <g transform="translate(112.5, 72.5) scale(2.5)">
    <circle cx="35" cy="35" r="30" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="35" cy="35" r="15" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
    <path d="M35 35 L52.5 21" stroke="#22d3ee" stroke-width="4" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 35 35" to="360 35 35" dur="3s" repeatCount="indefinite" />
    </path>
    <circle cx="55" cy="20" r="3" fill="#FFFFFF">
      <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

   <!-- Text Bottom -->
  <text x="200" y="320" font-size="36" text-anchor="middle" class="text-main">POWER<tspan class="text-sub">RADAR</tspan></text>
</svg>
